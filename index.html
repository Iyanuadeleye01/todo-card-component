<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card</title>

    <link rel="stylesheet" href="style/todo.css">
</head>

<body>
    <article data-testid="test-todo-card" class="card">
        <!---Top row-->
        <div class="top-row">
            <label for="completeToggle">Mark as complete</label>
            <input type="checkbox" id="completeToggle" data-testid="test-todo-complete-toggle">
        </div>

        <!--Title-->
        <h2 data-testid="test-todo-title" id="title">Finish Devops Project</h2>

        <!--Description-->
        <p data-testid="test-todo-description">Complete Docker, Terraform and deployment steps.</p>

        <!--Proority and Status-->
        <div class="meta">
            <span class="badge high" data-testid="test-todo-priority" aria-label="High priority">
                High
            </span>

            <span data-testid="test-todo-status" id="status">
                Pending
            </span>

        </div>

        <!--Due Date-->
        <p>
            <time id="dueDate" data-testid="test-todo-due-date" datetime="2026-03-01T18:00:00Z">
                Due March 1, 2026
            </time>
        </p>

        <!--Time Remaining-->
        <p id="timeRemaining" data-testid="test-todo-time-remaining">

        </p>

        <!--Tags-->
        <div class="tags" data-testid="test-todo-tags" role="list"> <span class="tag"
                data-testid="test-todo-tag-work">Work</span> <span class="tag"
                data-testid="test-todo-tag-urgent">Urgent</span> <span class="tag">Design</span> </div> <!-- Buttons -->
        <div class="actions"> <button data-testid="test-todo-edit-button">Edit</button> <button
                data-testid="test-todo-delete-button">Delete</button> </div>
    </article>
    <script src="scripts/todo.js"></script>
</body>

</html>
